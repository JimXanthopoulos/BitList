<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forum РђЊ BitList</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bitlist.css">

    <style>
        body {
            padding-top: 80px;
        }

        
        .hamburger {
            display: flex;
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
        }


        #sendBtn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #970fbd6b;
            color: #E6FDFF;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        #sendBtn:hover {
            background: #b02fe2;
        }
        
        .forum-container {
            max-width: 900px;
            margin: 0 auto;
            background: #222627;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .forum-title {
            font-size: 2.5em;
            color: #E6FDFF;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .chat-box {
            height: 400px;
            background: #1b1f1f;
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            color: #E6FDFF;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: #970fbd6b;
            border-radius: 8px;
            width: fit-content;
            max-width: 80%;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        .chat-message.bot {
            background: #384142;
            margin-left: auto;
            text-align: right;
        }

        .chat-message a {
            color: #E6FDFF;
            text-decoration: underline;
        }

    </style>
</head>

<body>


<div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
</div>


<div class="side-menu" id="sideMenu">
    <nav class="side-nav">
        <a href="index.html">Home</a>
        <a href="list.html">Create List</a>
        <a href="forum.html">Forum</a>
        
    </nav>
</div>


<div class="forum-container">
    <h2 class="forum-title">Community Chat</h2>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type your message...">
        <button id="sendBtn">Send</button>
    </div>
</div>



<script>

let botHasFinished = false;

/* Hamburger */
const hamburger = document.getElementById('hamburger');
const sideMenu = document.getElementById('sideMenu');

hamburger.addEventListener('click', () => {
    sideMenu.classList.toggle('active');
});

/* Chat */
const chatBox = document.getElementById('chatBox');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
});

function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    
    const userMsg = document.createElement('div');
    userMsg.className = 'chat-message';
    userMsg.textContent = text;
    chatBox.appendChild(userMsg);

    chatBox.scrollTop = chatBox.scrollHeight;
    chatInput.value = '';

    
    if (!botHasFinished) {
        setTimeout(botFirstReply, 2000);
    }
}


function botFirstReply() {
    const botMsg = document.createElement('div');
    botMsg.className = 'chat-message bot';

    botMsg.innerHTML = `
    
        <a href="https://youtu.be/dQw4w9WgXcQ?si=HTt6AJfA-mnvLUEZ" target="_blank">
            click here ;) </a>
    `;

    chatBox.appendChild(botMsg);
    chatBox.scrollTop = chatBox.scrollHeight;
    setTimeout(botFinalReply, 10000);
}

function botFinalReply() {
    const finalMsg = document.createElement('div');
    finalMsg.className = 'chat-message bot';
    finalMsg.innerHTML =`
    <pre>
 РађРађРађРађРађРађРађРађРбђРА┤РаіРаЅРаЅРбЅРаЈРа╗РБЇРаЉРб▓РабРацРБёРБђРађРађРађРађРађРађРађ
РађРађРађРађРађРађРађРађРБ╗РБ┐РбЪРБйРа┐Ра»РаЏРАИРб╣РађРб╣РањРБіРААРаюРаЊРабРБёРађРађРађРађ
РађРађРађРађРађРађРбђРАюРБ┐РБиРБйРаЊРађРбаРбѓРББРаІРаѓРБЙРа╝РбїРа│РбёРбђРАаРаюРББРАђРађРађ
РађРађРађРађРађРбаРб╗Рб▒РБГРаиРацРбЁРа┤РБАРА╗РаЃРађРбаРаЂРађРбђРА▒РаюРаЇРбћРаіРађРа╣РАёРађ
РађРађРађРађРбђРБиРаїРаџРаиРаєРааРаХРаГРбњРБЂРађРБцРаЃРБђРбћРбІРАцРаіРаЉРБёРа│РБёРађРБДРађ
РађРађРађРађРађРаЉРадРБђРАцРБёРаёРбёРБђРБаРБњРбдРАёРаЕРаиРадРаіРађРађРађРаѕРаБРАЈРабРБ┐Рађ
РађРађРађРађРађРађРБИРбФРаЪРБЮРаъРБ╝Рб▓РАъРБъРаІРаІРаЅРаІРаЊРАёРађРађРађРађРађРБеРаѓРбИРАЁ
РађРађРађРађРађРБ░РаЃРАеРаіРбђРАаРАїРбўРбЄРаъРађРађРађРађРаѓРаАРАёРађРађРбђРаъРбЂРаћРб╣РАЄ
РађРађРађРађРБ░РББРаъРбђРаћРбАРббРаЄРАўРаїРађРађРађРађРађРађРааРАїРабРАћРбЂРА┤РаЂРађРбИРаЃ
РађРађРађРбаРаЪРаЂРааРбіРаћРБАРбИРађРаЃРаЂРађРађРађРађРађРађРађРБ»РаѓРАђРбфРАђРађРађРбИРађ
РађРбђРаћРБЂРаљРаеРађРађРаѕРађРбёРаўРАђРађРаѕРбєРађРађРађРађРАаРбЂРаюРаЎРбдРаЎРБдРађРбИРађ
РА┤РаЂРаўРАЂРБђРААРађРађРа┤РањРаЌРаІРаЅРаЅРАєРађРаєРаёРаёРаўРађРАјРађРађРађРаЉРбЁРаЉРб╝РАђ
Рб»РБЅРБЊРањРањРацРацРБёРБђРБђРБђРБђРАђРаљРаЂРађРађРађРањРађРбђРАђРађРађРађРађРађРаЉРБїРБЄ
РађРаѕРб│РаёРаѕРађРацРбёРБђРађРбѕРБЅРА╣Ра»РАЪРаЂРађРађРађРађРбИРађРађРаѓРађРађРАаРаџРБАРА┐
РађРбаРБІРБђРБђРБђРБђРацРаГРбЏРАЕРаёРањРаЕРаѓРбђРаёРађРађРађРаѕРббРАђРађРАаРаІРАЕРаІРађРб│
РађРб╣РацРагРацРагРаГРБЅРБЅРбЃРађРађРБђРБђРађРаЂРађРађРађРађРАъРб║РАѕРаІРАбРаіРађРађРађРбИ
РађРаѕРАєРаЂРбђРађРађРађРаЅРаІРаЅРаЊРаѓРацРБђРАђРађРађРађРађРАДРаіРАаРадРАѕРа│РбёРађРађРаѕ
РађРађРб╣РАюРађРаЂРађРађРањРбцРАёРацРаћРаХРањРаЏРаДРађРађРА╝РАаРаіРађРађРаЎРбдРАѕРа│РАёРађ
РађРађРбИРаєРађРаѕРађРааРађРаѕРађРађРађРађРађРађРађРађРАюРбИРађРађРађРађРађРађРаЉРбёРаѕРб▓
РађРађРбИРбђРаЄРађРађРађРађРбђРађРађРађРађРађРађРАёРаіРбаРаЃРађРађРађРађРађРађРађРаѕРАбРБИ
РађРађРаѕРа│РБцРБёРАђРађРађРађРаѕРаЅРаЅРаЂРањРаЂРађРааРБЈРађРађРађРађРађРађРбђРБћРаЙРА┐РаЃ
РађРађРађРађРађРаЅРаЎРаЏРањРацРацРБцРБёРБђРБђРБђРБћРБбРБђРБЅРБѓРБђРБђРБаРа┤Ра┐РаЏРаІРађ
    </pre>    
    `

    chatBox.appendChild(finalMsg);
    chatBox.scrollTop = chatBox.scrollHeight;

    botHasFinished = true;
}

</script>

</body>
</html>
